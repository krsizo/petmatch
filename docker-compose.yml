services:
  postgres:
    image: postgres:16
    container_name: petmatch-postgres
    environment:
      POSTGRES_DB: petmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGTZ: UTC
      TZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - petmatch-postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: petmatch-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  app:
    build: .
    container_name: petmatch-api
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petmatch?options=-c%20TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_JWT_SECRET: superSecretKeysuperSecretKeysuperSecretKey1234567890
      APP_JWT_EXPIRATION_MS: 86400000

volumes:
  petmatch-postgres-data:
