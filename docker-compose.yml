services:
  postgres:
    image: postgres:16
    container_name: petmatch-postgres
    environment:
      POSTGRES_DB: petmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - petmatch-postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: petmatch-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  petmatch-postgres-data:
